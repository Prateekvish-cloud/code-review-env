name: code-review-env
description: AI environment for code review with multiple tasks and graders

tasks:
  - name: bug_detection
    description: Detect bugs in code
  - name: performance_review
    description: Suggest performance improvements
  - name: clean_code_approval
    description: Approve correct code

actions:
  - report_bug
  - improve_code
  - approve

observation_space:
  type: text

reward_range: [0.1, 0.9]
