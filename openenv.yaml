env_id: code-review-env
version: "1.0.0"
description: "AI environment for code review"

tasks:
  - id: bug_detection
    difficulty: easy
    max_steps: 10
    grader:
      type: python
      entry_point: env.grader:grade_bug_detection

  - id: performance_review
    difficulty: medium
    max_steps: 15
    grader:
      type: python
      entry_point: env.grader:grade_performance_review

  - id: clean_code_approval
    difficulty: hard
    max_steps: 20
    grader:
      type: python
      entry_point: env.grader:grade_clean_code_approval