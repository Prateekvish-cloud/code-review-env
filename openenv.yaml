env_id: code-review-env
version: "1.0.0"
description: "AI environment for code review"

tasks:
  - id: bug_detection
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the bug detection 0.0 to 1.0."

  - id: performance_review
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the performance review 0.0 to 1.0."

  - id: clean_code_approval
    difficulty: hard
    max_steps: 20
    grader:
      type: llm
      prompt_template: "Score the code approval 0.0 to 1.0."
